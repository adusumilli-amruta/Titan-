name: Titan CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install linters
        run: pip install flake8 black isort mypy
      - name: Run flake8
        run: flake8 titan/ --max-line-length=120 --ignore=E203,W503
      - name: Check formatting (black)
        run: black --check titan/
      - name: Check imports (isort)
        run: isort --check-only titan/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install transformers accelerate datasets
          pip install fastapi httpx uvicorn pydantic
          pip install pytest pytest-cov pytest-asyncio
          pip install -e .
      - name: Run unit tests (CPU)
        run: |
          python -m pytest tests/ -v --tb=short --cov=titan --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: coverage.xml

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t titan-inference:latest .
      - name: Test Docker health
        run: |
          echo "Docker image built successfully"
          docker images titan-inference
