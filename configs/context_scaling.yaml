# ============================================================================
# Project Titan — Mid-Training Context Scaling Configuration
# ============================================================================
# Stage 2: Dynamically extending context windows from 4K → 32K tokens
# using Chunked RoPE scaling, Sliding Window Attention adjustments,
# and Recurrent Memory state handoffs.
# ============================================================================

model:
  checkpoint: "checkpoints/pretrain/final"
  
  # Context Scaling Parameters
  original_max_position: 8192
  target_max_position: 32768
  rope_scaling_factor: 4.0        # NTK-aware scaling: base * factor
  sliding_window_size: 8192       # Expanded from 4096 in Stage 1
  max_recurrent_memory_tokens: 32768

training:
  stage: "context_scaling"
  epochs: 1
  global_batch_size: 256          # Smaller batch for longer sequences
  micro_batch_size: 1             # 32K tokens per sample = tiny micro batches
  gradient_accumulation_steps: 32
  learning_rate: 2.0e-5           # Lower LR for continued pre-training
  weight_decay: 0.1
  warmup_steps: 500
  max_steps: 10000

data:
  # Long-document datasets for context extension
  dataset: "emozilla/pg19"        # Project Gutenberg books (long form)
  tokenizer: "meta-llama/Llama-2-7b-hf"
  max_length: 32768
  chunk_size: 8192
  chunk_overlap: 512
  max_chunks_per_doc: 16
  num_workers: 4

distributed:
  strategy: "deepspeed_zero3"
  mixed_precision: "bf16"
  activation_checkpointing: true
  selective_checkpointing: true
  cpu_offload_optimizer: true
  cpu_offload_params: true        # Offload params too for 32K context
  num_gpus: 8

logging:
  log_every_n_steps: 50
  save_every_n_steps: 2000
  checkpoint_dir: "checkpoints/context_scaled"
  wandb_project: "titan-context"
