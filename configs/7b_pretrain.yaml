# ============================================================================
# Project Titan — YAML Configuration Templates
# ============================================================================
# 7B Parameter Titan Pre-training Configuration
# This defines the full model geometry and training hyperparameters 
# for Stage 1: Massive Causal Language Modeling.
# ============================================================================

model:
  architecture: "TitanForCausalLM"
  vocab_size: 32000
  hidden_size: 4096
  intermediate_size: 11008
  num_hidden_layers: 32
  num_attention_heads: 32
  max_position_embeddings: 8192
  sliding_window_size: 4096
  max_recurrent_memory_tokens: 16384
  rms_norm_eps: 1.0e-6
  initializer_range: 0.02
  use_cache: true

training:
  stage: "pretrain"
  epochs: 1
  global_batch_size: 1024
  micro_batch_size: 8
  gradient_accumulation_steps: 16  # 1024 / (8 * 8 GPUs)
  learning_rate: 3.0e-4
  weight_decay: 0.1
  warmup_steps: 2000
  max_steps: 100000
  lr_scheduler: "cosine"
  gradient_clipping: 1.0
  seed: 42

data:
  dataset: "togethercomputer/RedPajama-Data-1T-Sample"
  tokenizer: "meta-llama/Llama-2-7b-hf"
  max_length: 4096
  sequence_packing: true
  num_workers: 8

distributed:
  strategy: "deepspeed_zero3"
  mixed_precision: "bf16"
  activation_checkpointing: true
  selective_checkpointing: true  # Only checkpoint attention, not MLP
  cpu_offload_optimizer: true
  cpu_offload_params: false  # Keep params on GPU for speed
  num_gpus: 8

logging:
  log_every_n_steps: 100
  save_every_n_steps: 5000
  checkpoint_dir: "checkpoints/pretrain"
  wandb_project: "titan-pretrain"
  wandb_entity: null  # Set to your W&B username
